<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Dashboard · 2026-05-13</title>
<style>
  :root{
    --bg:#0f172a; --bg-soft:#111c34; --card:#172447; --card-hover:#1e2d59;
    --text:#e2e8f0; --muted:#94a3b8; --border:#243661;
    --accent:#38bdf8; --accent-2:#f472b6;
    --chip-bg:#1e293b; --chip-text:#cbd5e1;
    --tag-realestate:#fb923c; --tag-tourism:#34d399; --tag-logistics:#60a5fa;
    --tag-agri:#a3e635; --tag-energy:#facc15; --tag-industry:#f87171;
    --tag-auto:#c084fc; --tag-pharma:#22d3ee;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;line-height:1.55}
  .wrap{max-width:1280px;margin:0 auto;padding:32px 24px 64px}
  header.hero{display:flex;flex-direction:column;gap:8px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
  header.hero h1{font-size:28px;margin:0;letter-spacing:-0.02em}
  header.hero p{margin:0;color:var(--muted);font-size:14px}
  header.hero .meta{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:13px;color:var(--muted)}
  header.hero .meta strong{color:var(--text);font-weight:600}

  .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;align-items:center}
  .search{flex:1;min-width:240px;display:flex;align-items:center;background:var(--bg-soft);border:1px solid var(--border);border-radius:10px;padding:8px 12px}
  .search input{flex:1;border:0;background:transparent;color:var(--text);outline:none;font-size:14px}
  .search svg{width:16px;height:16px;color:var(--muted);margin-right:8px;flex-shrink:0}
  .filters{display:flex;flex-wrap:wrap;gap:6px}
  .filter-btn{background:var(--chip-bg);color:var(--chip-text);border:1px solid var(--border);padding:6px 12px;border-radius:999px;cursor:pointer;font-size:13px;transition:all .15s}
  .filter-btn:hover{border-color:var(--accent)}
  .filter-btn.active{background:var(--accent);color:#0b1220;border-color:var(--accent);font-weight:600}

  .section{margin-bottom:28px}
  .section h2{display:flex;align-items:center;gap:10px;margin:0 0 14px;font-size:18px;letter-spacing:-0.01em}
  .section h2 .count{font-size:12px;color:var(--muted);font-weight:500;background:var(--chip-bg);padding:2px 8px;border-radius:999px}
  .topic-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:all .18s ease;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent)}
  .card:hover{background:var(--card-hover);transform:translateY(-2px);border-color:var(--accent)}
  .card .tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}
  .card .tag .dot{width:8px;height:8px;border-radius:50%}
  .card h3{margin:0;font-size:16px;line-height:1.35;color:var(--text);font-weight:600}
  .card p.tease{margin:0;font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card .footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;font-size:12px;color:var(--muted)}
  .card .footer .read{color:var(--accent);font-weight:600}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(2,6,23,0.78);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;z-index:100;overflow-y:auto}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--bg-soft);border:1px solid var(--border);border-radius:18px;max-width:780px;width:100%;padding:28px;position:relative;animation:modalIn .22s ease}
  @keyframes modalIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal .close{position:absolute;top:14px;right:14px;background:transparent;border:0;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .modal .close:hover{background:var(--card);color:var(--text)}
  .modal .modal-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px}
  .modal .modal-tag .dot{width:8px;height:8px;border-radius:50%}
  .modal h2{margin:0 0 6px;font-size:22px;line-height:1.3;letter-spacing:-0.01em}
  .modal .modal-meta{font-size:13px;color:var(--muted);margin-bottom:18px}
  .modal .modal-meta a{color:var(--accent);text-decoration:none}
  .modal .modal-meta a:hover{text-decoration:underline}
  .modal .content section{margin-bottom:18px}
  .modal .content section:last-child{margin-bottom:0}
  .modal .content h4{margin:0 0 6px;font-size:14px;color:var(--accent);font-weight:700;letter-spacing:0.01em}
  .modal .content p{margin:0;font-size:14.5px;line-height:1.65;color:#cbd5e1}
  .modal .modal-footer{margin-top:20px;padding-top:18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .modal .modal-footer .src-btn{background:var(--accent);color:#0b1220;padding:9px 16px;border-radius:10px;font-weight:600;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
  .modal .modal-footer .src-btn:hover{background:#7dd3fc}

  .empty{padding:60px 0;text-align:center;color:var(--muted);font-size:14px}

  /* Tag colors */
  [data-topic="realestate"]{--tag:var(--tag-realestate)}
  [data-topic="tourism"]{--tag:var(--tag-tourism)}
  [data-topic="logistics"]{--tag:var(--tag-logistics)}
  [data-topic="agriculture"]{--tag:var(--tag-agri)}
  [data-topic="energy"]{--tag:var(--tag-energy)}
  [data-topic="industry"]{--tag:var(--tag-industry)}
  [data-topic="auto"]{--tag:var(--tag-auto)}
  [data-topic="pharma"]{--tag:var(--tag-pharma)}
  .card[data-topic] .tag .dot,.card[data-topic]::before,.section h2[data-topic] .topic-dot,.modal[data-topic] .modal-tag .dot{background:var(--tag)}
  .card[data-topic]::before{background:var(--tag)}

  @media (max-width:600px){
    .wrap{padding:20px 14px 48px}
    header.hero h1{font-size:22px}
    .grid{grid-template-columns:1fr}
    .modal{padding:22px 18px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>News Dashboard</h1>
    <p>Tổng hợp các bài viết tóm tắt từ thư mục <code>news/</code> — mỗi đoạn mở đầu bằng câu chủ đề và luận điểm.</p>
    <div class="meta">
      <span><strong>Ngày báo cáo:</strong> 13/05/2026</span>
      <span><strong>Tổng số bài:</strong> <span id="totalCount">8</span></span>
      <span><strong>Chủ đề:</strong> 8</span>
    </div>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Tìm theo tiêu đề, từ khóa hoặc nội dung..." />
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Tất cả</button>
    </div>
  </div>

  <div id="sections"></div>
  <div id="empty" class="empty" style="display:none">Không có bài viết phù hợp với bộ lọc.</div>
</div>

<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
  <div class="modal" id="modal" data-topic="">
    <button class="close" aria-label="Đóng">&times;</button>
    <div class="modal-tag"><span class="dot"></span><span id="m-topic-label"></span></div>
    <h2 id="m-title"></h2>
    <div class="modal-meta" id="m-meta"></div>
    <div class="content" id="m-content"></div>
    <div class="modal-footer">
      <span style="color:var(--muted);font-size:12px">Nhấn ESC hoặc click ngoài để đóng</span>
      <a id="m-source" class="src-btn" target="_blank" rel="noopener">Đọc bài gốc →</a>
    </div>
  </div>
</div>

<script>
const TOPICS = {
  realestate: {label:"Bất động sản", color:"var(--tag-realestate)"},
  tourism:    {label:"Du lịch",      color:"var(--tag-tourism)"},
  logistics:  {label:"Logistics",    color:"var(--tag-logistics)"},
  agriculture:{label:"Nông nghiệp – Chăn nuôi", color:"var(--tag-agri)"},
  energy:     {label:"Năng lượng",   color:"var(--tag-energy)"},
  industry:   {label:"Sản xuất công nghiệp", color:"var(--tag-industry)"},
  auto:       {label:"Ô tô",         color:"var(--tag-auto)"},
  pharma:     {label:"Dược phẩm – M&A", color:"var(--tag-pharma)"}
};

const ARTICLES = [
  {
    id:"thailand-land",
    topic:"realestate",
    shortTitle:"Đất nền Thái Lan ảm đạm nhất 30 năm",
    fullTitle:"Thị trường đất nền Thái Lan ảm đạm nhất trong 30 năm",
    source:"VietnamBiz",
    date:"2026-05-13",
    url:"https://vietnambiz.vn/thi-truong-dat-nen-thai-lan-am-dam-nhat-trong-30-nam-2026513203655282.htm",
    tease:"Cung tăng vọt, giao dịch tê liệt; nhiều lô đất Bangkok giảm 30-50% giá nhưng vẫn ế.",
    sections:[
      {h:"Cung tăng vọt nhưng cầu đóng băng", p:"Thị trường đất nền tại Bangkok và các thành phố lớn của Thái Lan đang trải qua giai đoạn biến động nặng nề nhất trong 30 năm kể từ khủng hoảng Tom Yum Kung. Theo ông Wasan Kongchan – Chủ tịch Hiệp hội Kinh doanh và Tiếp thị Bất động sản, một lượng lớn đất trống đang được chào bán bởi cả nhà môi giới và nhà phát triển nắm giữ quỹ đất lâu năm nhưng không có kế hoạch phát triển. Ngay cả các tập đoàn ngoài ngành bất động sản cũng buộc phải bán đất để quản lý danh mục và dòng tiền, song hầu như không có giao dịch nào hoàn tất – cho thấy thị trường tràn cung trong khi cầu gần như tê liệt."},
      {h:"Nguyên nhân: thuế nặng và kinh tế suy thoái", p:"Sự suy thoái phản ánh trực diện áp lực thuế đất, thuế xây dựng cùng môi trường kinh tế khó khăn khiến các nhà phát triển ngừng mua đất và hoãn đầu tư mới. Một số lô đất phải giảm giá 30–50% để đẩy nhanh thanh khoản: đất gần ga BTS Punnawithi (Sukhumvit) giảm từ 1,3 triệu xuống 1 triệu baht/m²; đất Thonglor từ 2–2,5 triệu xuống 1,5–1,7 triệu baht/m²; đất Bang Khae lao dốc từ 300.000 baht/m² (2024) xuống 150.000 baht/m² sau thương lượng. Ông Issara Boonyang bổ sung rằng thuế đất bỏ không buộc các chủ đất sẵn sàng cho thuê dài hạn 10–15 năm – mở ra cơ hội cho chuỗi cửa hàng tiện lợi mở rộng mạng lưới."},
      {h:"Chỉ một số khu vực \"có chọn lọc\" còn hấp dẫn", p:"Trong bối cảnh chung ảm đạm, sự tăng trưởng vẫn diễn ra có chọn lọc dựa trên vị trí và phân khúc khách hàng cụ thể. Các nhà phát triển ưu tiên những khu vực có nhu cầu rõ ràng như giao lộ Bangna với phức hợp Bangkok Mall, đường Bangkok Kreetha gần sân bay – trường quốc tế, các khu vực Halal (Srinakarin, Ramkhamhaeng, Min Buri) và các điểm đến ngôi nhà thứ hai cho người nước ngoài (Pattaya, Hua Hin, Phuket, Samui). Đây có thể là tình trạng tạm thời, và khi kinh tế cải thiện giá đất sẽ tăng trở lại – nghĩa là hiện tại là cơ hội cho người mua nếu chọn đúng vị trí."}
    ]
  },
  {
    id:"vn-tourism",
    topic:"tourism",
    shortTitle:"Việt Nam dẫn đầu ĐNÁ về tăng trưởng khách quốc tế",
    fullTitle:"Vượt Thái Lan và Singapore, Việt Nam dẫn đầu Đông Nam Á về tăng trưởng khách quốc tế",
    source:"VietnamBiz",
    date:"2026-05-11",
    url:"https://vietnambiz.vn/vuot-thai-lan-va-singapore-viet-nam-dan-dau-dong-nam-a-ve-tang-truong-khach-quoc-te-2026511105555324.htm",
    tease:"4 tháng đón 8,8 triệu lượt khách (+14,6%), khách Nga tăng gần 300%; mục tiêu năm 25 triệu lượt.",
    sections:[
      {h:"Việt Nam là điểm sáng tăng trưởng hai con số duy nhất trong khu vực", p:"Bốn tháng đầu năm 2026, Việt Nam đón 8,8 triệu lượt khách quốc tế, tăng 14,6% và là quốc gia Đông Nam Á duy nhất duy trì tăng trưởng hai con số. Riêng tháng 4 đạt 2,03 triệu lượt, đánh dấu lần đầu tiên ngành du lịch có bốn tháng liên tiếp vượt 2 triệu lượt khách/tháng. So với khu vực, Thái Lan giảm 3,4% (11,3 triệu lượt), Singapore chỉ tăng nhẹ 2,8% trong quý I, Indonesia đạt 3,51 triệu lượt và Philippines 1,83 triệu lượt – khẳng định vị thế Việt Nam là điểm đến an toàn, ổn định và hấp dẫn."},
      {h:"Cơ cấu thị trường khách dịch chuyển tích cực", p:"Sự đa dạng hóa thị trường nguồn đang tạo nền tảng tăng trưởng bền vững hơn cho du lịch Việt Nam. Khách Nga tăng gần 300%, Philippines lần đầu lọt top 10 thị trường gửi khách lớn nhất, cùng với sự tăng trưởng mạnh từ Ấn Độ và các nước Đông Nam Á. Kết quả này càng có ý nghĩa trong bối cảnh thế giới đối mặt biến động địa chính trị và rủi ro an ninh kéo dài."},
      {h:"Hai kịch bản tăng trưởng cho năm 2026", p:"Cục Du lịch Quốc gia Việt Nam xây dựng hai kịch bản tăng trưởng dựa trên diễn biến quốc tế. Kịch bản cao đặt mục tiêu 25 triệu lượt khách quốc tế, 150 triệu lượt khách nội địa và tổng thu 1,125 triệu tỷ đồng; kịch bản thấp đạt 22,5 triệu lượt khách quốc tế và 130 triệu lượt khách nội địa nếu xung đột kéo dài hoặc phát sinh thiên tai. Ngành đối mặt thách thức gồm giá nhiên liệu tăng, chi phí hàng không leo thang, nguy cơ gián đoạn đường bay và cạnh tranh thị thực gay gắt giữa các nước Đông Nam Á."},
      {h:"Định hướng dài hạn 2026–2031", p:"Tầm nhìn đến 2030 chia làm ba kịch bản với mục tiêu tham vọng nhất là 45–50 triệu lượt khách quốc tế. Kịch bản thận trọng tăng 8–10%/năm (35–38 triệu lượt năm 2030), cơ sở 12–15%/năm (40–45 triệu lượt), và cao 15–18%/năm nếu có đột phá về thị thực, hàng không và chuyển đổi số. Để hiện thực hóa, ngành sẽ tập trung sửa Luật Du lịch 2017, đẩy mạnh chuyển đổi số, định vị thương hiệu điểm đến và nâng cao năng lực cạnh tranh – đặc biệt khi hơn 90% trong số 4.000 doanh nghiệp lữ hành quốc tế là doanh nghiệp nhỏ và siêu nhỏ."}
    ]
  },
  {
    id:"viettel-post",
    topic:"logistics",
    shortTitle:"Viettel Post (VTP) dồn lực cho logistics, hợp tác FedEx",
    fullTitle:"Viettel Post (VTP): Dồn toàn lực cho mảng chuyển phát – logistics, thâm nhập chuỗi cung ứng toàn cầu",
    source:"Tạp chí Công Thương",
    date:"2026-05-08",
    url:"https://tapchicongthuong.vn/viettel-post--vtp-don-toan-luc-cho-mang-chuyen-phat-logistics--tham-nhap-chuoi-cung-ung-toan-cau-516124.htm",
    tease:"Hy sinh lợi nhuận ngắn hạn: đầu tư Đà Nẵng, mở công ty tại Quảng Tây, ký FedEx làm NNP tại VN.",
    sections:[
      {h:"Hy sinh lợi nhuận ngắn hạn để tái cấu trúc dài hạn", p:"Viettel Post đang chấp nhận đánh đổi lợi nhuận ngắn hạn để tập trung toàn lực cho mảng chuyển phát và logistics. Quý 1/2026, doanh thu thuần đạt 4.758 tỷ đồng (giảm 5,6%) do thu hẹp mảng thẻ cào, lãi ròng giảm 43% còn 39 tỷ đồng – mới hoàn thành 10% kế hoạch lợi nhuận năm. Tại ĐHĐCĐ 2026, ban lãnh đạo nhấn mạnh chiến lược ưu tiên mở rộng quy mô hệ thống logistics và nâng vị thế trong chuỗi cung ứng thay vì tối ưu lợi nhuận trước mắt."},

  Object.entries(TOPICS).forEach(([key, t]) => {
    const count = ARTICLES.filter(a => a.topic === key).length;
    if (!count) return;
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.dataset.filter = key;
    btn.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${t.color};margin-right:6px;vertical-align:middle"></span>${t.label} <span style="opacity:.6">${count}</span>`;
    btn.addEventListener("click", () => setFilter(key));
    filters.appendChild(btn);
  });
  document.querySelector('[data-filter="all"]').addEventListener("click", () => setFilter("all"));
}

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.filter === f));
  renderSections();
}

function renderSections(){
  const container = document.getElementById("sections");
  container.innerHTML = "";
  const q = currentSearch.trim().toLowerCase();

  const filtered = ARTICLES.filter(a => {
    if (currentFilter !== "all" && a.topic !== currentFilter) return false;
    if (!q) return true;
    const haystack = (a.shortTitle + " " + a.fullTitle + " " + a.tease + " " + a.sections.map(s => s.h + " " + s.p).join(" ")).toLowerCase();
    return haystack.includes(q);
  });

  if (!filtered.length){
    document.getElementById("empty").style.display = "block";
    return;
  }
  document.getElementById("empty").style.display = "none";

  // group by topic
  const order = Object.keys(TOPICS);
  order.forEach(topicKey => {
    const items = filtered.filter(a => a.topic === topicKey);
    if (!items.length) return;
    const t = TOPICS[topicKey];
    const section = document.createElement("section");
    section.className = "section";
    section.innerHTML = `
      <h2 data-topic="${topicKey}"><span class="topic-dot" style="background:${t.color}"></span>${t.label} <span class="count">${items.length}</span></h2>
      <div class="grid"></div>
    `;
    const grid = section.querySelector(".grid");
    items.forEach(a => grid.appendChild(makeCard(a)));
    container.appendChild(section);
  });
}

function makeCard(a){
  const t = TOPICS[a.topic];
  const card = document.createElement("article");
  card.className = "card";
  card.dataset.topic = a.topic;
  card.innerHTML = `
    <div class="tag"><span class="dot"></span>${t.label}</div>
    <h3>${a.shortTitle}</h3>
    <p class="tease">${a.tease}</p>
    <div class="footer"><span>${a.source} · ${a.date}</span><span class="read">Xem chi tiết →</span></div>
  `;
  card.addEventListener("click", () => openModal(a));
  return card;
}

// --- Modal ---
function openModal(a){
  const t = TOPICS[a.topic];
  const backdrop = document.getElementById("modalBackdrop");
  const modal = document.getElementById("modal");
  modal.dataset.topic = a.topic;
  document.getElementById("m-topic-label").textContent = t.label;
  document.getElementById("m-title").textContent = a.fullTitle;
  document.getElementById("m-meta").innerHTML = `<strong>Nguồn:</strong> ${a.source} · <strong>Ngày đăng:</strong> ${a.date}`;
  const content = document.getElementById("m-content");
  content.innerHTML = a.sections.map(s => `<section><h4>${s.h}</h4><p>${s.p}</p></section>`).join("");
  document.getElementById("m-source").href = a.url;
  backdrop.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(){
  document.getElementById("modalBackdrop").classList.remove("open");
  document.body.style.overflow = "";
}

document.getElementById("modalBackdrop").addEventListener("click", e => { if (e.target.id === "modalBackdrop") closeModal(); });
document.querySelector("#modal .close").addEventListener("click", closeModal);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("searchInput").addEventListener("input", e => { currentSearch = e.target.value; renderSections(); });

// init
document.getElementById("totalCount").textContent = ARTICLES.length;
renderFilters();
renderSections();
</script>
</body>
</html>
