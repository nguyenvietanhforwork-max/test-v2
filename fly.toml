# Atlas API — Fly.io config (alternative to Railway/Render).
# Run:  fly launch --copy-config --no-deploy
#       fly secrets set SUPABASE_DB_URL="..." ANTHROPIC_API_KEY="..." OPENAI_API_KEY="..."
#       fly deploy

app = "atlas-api"
primary_region = "sin"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  ENV = "prod"
  PORT = "8000"
  STORAGE_BACKEND = "supabase"
  USE_SUPABASE_REALTIME = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/healthz"

[deploy]
  release_command = "alembic upgrade head"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
