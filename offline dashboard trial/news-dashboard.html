<head>

<title>Intelligence Platform — News Dashboard</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #11141b;
    --panel-2: #161a23;
    --border: #1f2530;
    --border-2: #2a3140;
    --text: #e6e9ef;
    --muted: #8a93a3;
    --accent: #7aa2ff;
    --accent-2: #5eead4;
    --danger: #f87171;
    --warn: #fbbf24;
    --good: #34d399;
    --chip: #1e2330;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--text); }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif; margin: 0; line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    position: sticky; top: 0; z-index: 10;
    backdrop-filter: blur(14px); background: rgba(11,13,18,.78);
    border-bottom: 1px solid var(--border);
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 18px 24px; }
  .title-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .subtitle { color: var(--muted); font-size: 13px; }
  .stat { color: var(--muted); font-size: 13px; }
  .stat b { color: var(--text); font-weight: 600; }

  .controls { margin-top: 14px; display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; }
  .search {
    background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 10px;
    padding: 10px 14px; color: var(--text); font-size: 14px; width: 100%;
  }
  .search:focus { outline: none; border-color: var(--accent); }
  select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border-2);
    border-radius: 10px; padding: 10px 12px; font-size: 14px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip {
    background: var(--chip); color: var(--text); border: 1px solid var(--border-2);
    border-radius: 999px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    user-select: none; transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #07101e; border-color: var(--accent); font-weight: 600; }
  .chip .count { opacity: .65; margin-left: 6px; font-variant-numeric: tabular-nums; }
  .chip.active .count { opacity: .8; }

  main.wrap { padding-top: 22px; padding-bottom: 60px; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 28px 0 10px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; transition: border-color .15s, transform .15s;
    cursor: pointer; display: flex; flex-direction: column; gap: 10px;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card.open { border-color: var(--accent); background: var(--panel-2); }
  .card-meta { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); }
  .card-meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }
  .card-cat {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: .03em;
  }
  .cat-tax       { background: rgba(251,191,36,.16); color: var(--warn); }
  .cat-trade     { background: rgba(94,234,212,.14); color: var(--accent-2); }
  .cat-company   { background: rgba(122,162,255,.16); color: var(--accent); }
  .cat-market    { background: rgba(248,113,113,.14); color: var(--danger); }
  .cat-energy    { background: rgba(253,224,71,.14); color: #fde047; }
  .cat-intl      { background: rgba(190,150,255,.18); color: #c4b5fd; }
  .cat-other     { background: rgba(148,163,184,.18); color: #cbd5e1; }
  .card-title { font-size: 15.5px; font-weight: 600; letter-spacing: -0.005em; }
  .card-desc { font-size: 13.5px; color: #c2c8d4; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); margin-top: auto; padding-top: 6px; }
  .card-footer .source { max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-footer .author { font-weight: 500; color: #aab4c5; }
  .card-detail {
    display: none; margin-top: 10px; padding-top: 12px; border-top: 1px dashed var(--border-2);
    font-size: 13px; color: #d2d7e2;
  }
  .card.open .card-detail { display: block; }
  .open-link {
    display: inline-block; margin-top: 10px; padding: 6px 12px; border-radius: 8px;
    background: var(--accent); color: #07101e; font-weight: 600; font-size: 12.5px;
  }
  .open-link:hover { text-decoration: none; opacity: .9; }

  .empty {
    text-align: center; color: var(--muted); padding: 60px 20px; border: 1px dashed var(--border-2);
    border-radius: 12px; margin-top: 20px;
  }
  .footer { color: var(--muted); font-size: 12px; margin-top: 40px; text-align: center; }
  .footer code { background: var(--panel-2); padding: 2px 6px; border-radius: 4px; color: #aab4c5; }
  @media (max-width: 640px) {
    .controls { grid-template-columns: 1fr; }
    .title { font-size: 19px; }
  }
</style>
</head>

  // ── raw/old news/ (archive sample) ──

    desc:"As Southeast Asian countries ponder the use of nuclear power, China looks set to be a key player.",

  { title:"Vượt Thái Lan và Singapore, Việt Nam dẫn đầu Đông Nam Á về tăng trưởng khách quốc tế",
    desc:"Với mức tăng gần 15% lượng khách quốc tế trong 4 tháng đầu năm, Việt Nam là điểm đến duy nhất tại Đông Nam Á duy trì tăng trưởng hai con số.",
    author:"VietnamBiz", source:"vietnambiz.vn", published:"2026-05-11", cat:"trade", age:"archive",
    url:"https://vietnambiz.vn/vuot-thai-lan-va-singapore-viet-nam-dan-dau-dong-nam-a-ve-tang-truong-khach-quoc-te-2026511105555324.htm" },

const CATS = [
  { id:"tax",     label:"Thuế & Pháp lý" },
  { id:"trade",   label:"Xuất khẩu & Thương mại" },
  { id:"company", label:"Doanh nghiệp" },
  { id:"market",  label:"Tài chính & Thị trường" },
  { id:"energy",  label:"Năng lượng" },
  { id:"intl",    label:"Quốc tế" },
];

// ── State ────────────────────────────────────────────────────────────────
const state = {
  q: "",
  cats: new Set(),
  sort: localStorage.getItem("ip-sort") || "newest",
  age: localStorage.getItem("ip-age") || "all",
  open: new Set(),
};

// ── Rendering ────────────────────────────────────────────────────────────
function fmtDate(s) {
  // 2026-05-15 → "15 May 2026"
  const [y,m,d] = s.split("-");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
}

function renderChips() {
  const counts = {};
  for (const c of CATS) counts[c.id] = 0;
  for (const it of ITEMS) counts[it.cat] = (counts[it.cat]||0) + 1;
  const wrap = document.getElementById("chips");
  wrap.innerHTML = "";
  for (const c of CATS) {
    const el = document.createElement("div");
    el.className = "chip" + (state.cats.has(c.id) ? " active" : "");
    el.innerHTML = `${c.label}<span class="count">${counts[c.id]||0}</span>`;
    el.onclick = () => {
      if (state.cats.has(c.id)) state.cats.delete(c.id);
      else state.cats.add(c.id);
      renderChips(); renderResults();
    };
    wrap.appendChild(el);
  }
  // "All" reset chip
  if (state.cats.size > 0) {
    const reset = document.createElement("div");
    reset.className = "chip";
    reset.style.borderColor = "var(--accent)";
    reset.style.color = "var(--accent)";
    reset.innerHTML = "× Xóa lọc";
    reset.onclick = () => { state.cats.clear(); renderChips(); renderResults(); };
    wrap.appendChild(reset);
  }
}

function matches(it) {
  if (state.cats.size > 0 && !state.cats.has(it.cat)) return false;
  if (state.age !== "all" && it.age !== state.age) return false;
  if (state.q) {
    const hay = (it.title + " " + it.desc + " " + it.author + " " + it.source).toLowerCase();
    if (!hay.includes(state.q.toLowerCase())) return false;
  }
  return true;
}

function renderResults() {
  let list = ITEMS.filter(matches);
  if (state.sort === "newest") list.sort((a,b) => b.published.localeCompare(a.published));
  else if (state.sort === "oldest") list.sort((a,b) => a.published.localeCompare(b.published));
  else if (state.sort === "title") list.sort((a,b) => a.title.localeCompare(b.title));

  const newsCount = ITEMS.filter(x => x.age==="news").length;
  const archiveCount = ITEMS.filter(x => x.age==="archive").length;
  const rootCount = ITEMS.filter(x => x.age==="root").length;
  document.getElementById("stat-line").innerHTML =
    `<b>${ITEMS.length}</b> bài · <b>${newsCount}</b> trong news/ · <b>${rootCount}</b> tại raw/ · <b>${archiveCount}</b> archive · Hiển thị <b>${list.length}</b>`;

  const root = document.getElementById("results");
  root.innerHTML = "";
  if (list.length === 0) {
    root.innerHTML = `<div class="empty">Không có tin nào khớp bộ lọc.</div>`;
    return;
  }

  // Group by publish date
  const byDate = new Map();
  for (const it of list) {
    if (!byDate.has(it.published)) byDate.set(it.published, []);
    byDate.get(it.published).push(it);
  }
  // already sorted by sort key above, but keep dates in that order
  const dates = state.sort === "title" ? [...byDate.keys()] : [...byDate.keys()];

  for (const date of dates) {
    const sec = document.createElement("div");
    sec.className = "section-title";
    sec.textContent = state.sort === "title" ? "" : fmtDate(date);
    if (state.sort !== "title") root.appendChild(sec);

    const grid = document.createElement("div");
    grid.className = "grid";
    for (const it of byDate.get(date)) {
      const key = it.url || it.title;
      const card = document.createElement("article");
      card.className = "card" + (state.open.has(key) ? " open" : "");
      card.onclick = (e) => {
        if (e.target.tagName === "A") return;
        if (state.open.has(key)) state.open.delete(key); else state.open.add(key);
        renderResults();
      };
      const catLabel = CATS.find(c => c.id === it.cat)?.label || "Khác";
      const ageBadge = it.age === "news" ? "📥 raw/news/" : it.age === "root" ? "📁 raw/" : "🗄 archive";
      card.innerHTML = `
        <div class="card-meta">
          <span class="card-cat cat-${it.cat}">${catLabel}</span>
          <span class="dot"></span>
          <span>${fmtDate(it.published)}</span>
          <span class="dot"></span>
          <span>${ageBadge}</span>
        </div>
        <div class="card-title">${escapeHtml(it.title)}</div>
        <div class="card-desc">${escapeHtml(it.desc)}</div>
        <div class="card-footer">
          <span class="source">📰 ${escapeHtml(it.source)}</span>
          <span class="author">${escapeHtml(it.author)}</span>
        </div>
        <div class="card-detail">
          <a class="open-link" href="${it.url}" target="_blank" rel="noreferrer noopener">Đọc nguồn gốc →</a>
        </div>
      `;
      grid.appendChild(card);
    }
    root.appendChild(grid);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// ── Wire up ──────────────────────────────────────────────────────────────
document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; renderResults(); });
document.getElementById("sort").addEventListener("change", e => { state.sort = e.target.value; localStorage.setItem("ip-sort", state.sort); renderResults(); });
document.getElementById("age").addEventListener("change", e => { state.age = e.target.value; localStorage.setItem("ip-age", state.age); renderResults(); });
document.getElementById("sort").value = state.sort;
document.getElementById("age").value = state.age;

renderChips();
renderResults();
</script>
</body>
</html>
