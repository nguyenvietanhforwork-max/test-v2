[build]
builder = "DOCKERFILE"
dockerfilePath = "services/ingestion/Dockerfile"
buildContext = "services/ingestion"

[deploy]
startCommand = "python -m ingestion.main"
restartPolicyType = "ALWAYS"

# Note: the watcher needs persistent access to the vault. On Railway this means
# mounting a volume; on a Hetzner box it sees the local vault directly. For
# Supabase-only setups, point Obsidian Sync at this box's filesystem.
