version: "3.9"

# Local-dev compose. Production uses Supabase + Railway + Vercel; this file
# exists so engineers can spin up the full stack on a laptop without cloud deps.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: intelligence
      POSTGRES_USER: intelligence
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "intelligence"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: dev-master-key
      MEILI_ENV: development
    ports: ["7700:7700"]
    volumes:
      - meilidata:/meili_data

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
    ports: ["5678:5678"]
    volumes:
      - n8ndata:/home/node/.n8n
      - ../../n8n/workflows:/workflows:ro

  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://intelligence:dev@postgres:5432/intelligence
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]
    volumes:
      - ../../apps/api:/app

  agents:
    build:
      context: ../../services/agents
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://intelligence:dev@postgres:5432/intelligence
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8001:8001"]

  workers:
    build:
      context: ../../services/workers
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://intelligence:dev@postgres:5432/intelligence
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: { condition: service_healthy }
    command: celery -A workers.app worker -l info -Q ingest,classify,report,pdf,sync

  watcher:
    build:
      context: ../../services/ingestion
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      VAULT_PATH: /vault
      API_BASE_URL: http://api:8000
    volumes:
      - ${VAULT_PATH:-./vault}:/vault
    depends_on: [api]

  pdf-engine:
    build:
      context: ../../services/pdf-engine
      dockerfile: Dockerfile
    env_file: ../../.env
    ports: ["4000:4000"]

  dashboard:
    build:
      context: ../../apps/dashboard
      dockerfile: Dockerfile
    env_file: ../../.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
  meilidata:
  n8ndata:
