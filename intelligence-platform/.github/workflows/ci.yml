name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [apps/api, services/agents, services/ingestion, services/workers]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
      - name: Ruff
        working-directory: ${{ matrix.service }}
        run: pip install ruff && ruff check .
      - name: Pytest
        working-directory: ${{ matrix.service }}
        run: pip install pytest pytest-asyncio && pytest -q || echo "no tests yet"

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @intelligence/dashboard typecheck
      - run: pnpm --filter @intelligence/dashboard build
      - run: pnpm --filter @intelligence/pdf-engine typecheck
      - run: pnpm --filter @intelligence/pdf-engine build
