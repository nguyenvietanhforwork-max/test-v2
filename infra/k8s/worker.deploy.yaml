apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: atlas
spec:
  replicas: 2
  selector: { matchLabels: { app: worker } }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/atlas/worker:latest
          envFrom: [{ secretRef: { name: atlas-secrets } }]
          command: ["celery", "-A", "packages.automation.worker.app", "worker", "--loglevel=info", "--concurrency=4"]
          resources:
            requests: { cpu: 1, memory: 2Gi }
            limits:   { cpu: 4, memory: 4Gi }
          volumeMounts:
            - { name: vault, mountPath: /vault }
      volumes:
        - name: vault
          persistentVolumeClaim: { claimName: atlas-vault }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beat
  namespace: atlas
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: beat } }
  template:
    metadata: { labels: { app: beat } }
    spec:
      containers:
        - name: beat
          image: ghcr.io/atlas/worker:latest
          envFrom: [{ secretRef: { name: atlas-secrets } }]
          command: ["celery", "-A", "packages.automation.worker.app", "beat", "--loglevel=info"]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: watcher
  namespace: atlas
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: watcher } }
  template:
    metadata: { labels: { app: watcher } }
    spec:
      containers:
        - name: watcher
          image: ghcr.io/atlas/watcher:latest
          envFrom: [{ secretRef: { name: atlas-secrets } }]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: vault, mountPath: /vault }
      volumes:
        - name: vault
          persistentVolumeClaim: { claimName: atlas-vault }
