apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: atlas
spec:
  replicas: 2
  selector: { matchLabels: { app: web } }
  template:
    metadata: { labels: { app: web } }
    spec:
      containers:
        - name: web
          image: ghcr.io/atlas/web:latest
          ports: [{ containerPort: 3000 }]
          env:
            - { name: NEXT_PUBLIC_API_URL, value: "https://atlas.example.com/api/v1" }
            - { name: NEXT_PUBLIC_WS_URL,  value: "wss://atlas.example.com/ws/stream" }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: 1,    memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata: { name: web, namespace: atlas }
spec:
  selector: { app: web }
  ports: [{ port: 3000, targetPort: 3000 }]
